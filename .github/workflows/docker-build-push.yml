name: Build and Push Docker Image

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed

concurrency:
  group: docker-build-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: watcher-in-the-water
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      !contains(github.event.workflow_run.head_commit.message, 'update image tag to')
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ env.GPG_PRIVATE_KEY }}
          passphrase: ${{ env.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.build-and-push.outputs.digest }}

      - name: Extract short SHA
        id: sha
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "short_sha=${HEAD_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Update values.yaml with new image tag
        run: |
          # Must match docker/metadata-action type=sha default tag: sha-<shortsha>
          sed -i 's/tag: ".*"/tag: "sha-${{ steps.sha.outputs.short_sha }}"/' helm/values.yaml

      - name: Configure git for GPG signing
        run: |
          git config --global user.name "Nathan Thomas"
          git config --global user.email "28681364+nwthomas@users.noreply.github.com"
          git config --global commit.gpgsign true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ github.event.workflow_run.head_branch }}
          commit-message: "feat: update image tag to ${{ steps.sha.outputs.short_sha }}"
          title: "Update image tag to ${{ steps.sha.outputs.short_sha }} for deployment"
          # NOTE: Update the if condition for running this entire workflow if the automated PR body changes.
          body: |
            🤖 **Automated Image Tag Update**

            This PR updates the Helm values.yaml file with the latest image tag.

            **Changes:**
            - Updated `image.tag` to `sha-${{ steps.sha.outputs.short_sha }}` (matches metadata-action `type=sha` tags)
            - Image built from commit: ${{ github.event.workflow_run.head_sha }}

            **Docker Image:**
            `${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short_sha }}`

            This PR was automatically created after successfully building and pushing the Docker image.
          branch: update-image-tag
          signoff: true
          committer: Nathan Thomas <28681364+nwthomas@users.noreply.github.com>
          author: Nathan Thomas <28681364+nwthomas@users.noreply.github.com>
