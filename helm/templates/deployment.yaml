apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "watcher-in-the-water.fullname" . }}
  labels:
    {{- include "watcher-in-the-water.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "watcher-in-the-water.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "watcher-in-the-water.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "watcher-in-the-water.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "watcher-in-the-water.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.livenessPath }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds }}
            successThreshold: {{ .Values.healthCheck.successThreshold }}
            failureThreshold: {{ .Values.healthCheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.readinessPath }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds }}
            successThreshold: {{ .Values.healthCheck.successThreshold }}
            failureThreshold: {{ .Values.healthCheck.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: {{ .Values.persistence.mountPath | quote }}
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "watcher-in-the-water.configmapName" . }}
                  key: PORT
            - name: LOG_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "watcher-in-the-water.configmapName" . }}
                  key: LOG_FORMAT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "watcher-in-the-water.configmapName" . }}
                  key: LOG_LEVEL
            - name: CHECK_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "watcher-in-the-water.configmapName" . }}
                  key: CHECK_INTERVAL
            - name: STATE_PATH
              valueFrom:
                configMapKeyRef:
                  name: {{ include "watcher-in-the-water.configmapName" . }}
                  key: STATE_PATH
            - name: IP_URLS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "watcher-in-the-water.configmapName" . }}
                  key: IP_URLS
            - name: WEBHOOK_URLS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "watcher-in-the-water.configmapName" . }}
                  key: WEBHOOK_URLS
          {{- range .Values.extraEnv }}
            - name: {{ .name }}
              {{- if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- else }}
              value: {{ .value | quote }}
              {{- end }}
          {{- end }}
          {{- if .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml .Values.extraEnvFrom | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "watcher-in-the-water.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
