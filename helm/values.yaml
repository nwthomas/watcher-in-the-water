# Default values for golang-server-boilerplate

replicaCount: 1

image:
  repository: ghcr.io/nathanthomas/golang-server-boilerplate
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: golang-server.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

healthCheck:
  enabled: true
  livenessPath: /health/live
  readinessPath: /health/ready
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 3

app:
  port: 8080
  logFormat: json

# Extra env vars: plain values, or from ConfigMap/Secret via valueFrom
# extraEnv:
#   - name: LOG_LEVEL
#     value: "debug"
#   - name: API_KEY
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: SECRET_NAME_HERE
#   - name: EXTERNAL_URL
#     valueFrom:
#       configMapKeyRef:
#         name: my-config
#         key: url
extraEnv: []

# Load all keys from ConfigMap or Secret
# extraEnvFrom:
#   - secretRef:
#       name: my-app-secrets
#   - configMapRef:
#       name: my-app-config
extraEnvFrom: []
