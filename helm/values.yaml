replicaCount: 1

image:
  repository: docker.io/nwthomas/watcher-in-the-water
  pullPolicy: IfNotPresent
  tag: "sha-6fea2aa"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: golang-server.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Do not raise maxReplicas above 1 while persistence is enabled: the chart uses a
# single ReadWriteOnce PVC, so extra replicas cannot share the state volume.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

healthCheck:
  enabled: true
  livenessPath: /health/live
  # Use /health/live so the Deployment can become Ready without outbound internet (readiness
  # would otherwise wait forever on /health/ready until the first successful IP poll).
  # Set to /health/ready if pods have egress and you want Ready=false until the watcher succeeds.
  readinessPath: /health/live
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 3

app:
  port: 8080
  logFormat: json
  logLevel: info
  checkInterval: 30s
  statePath: /var/lib/watcher/state.json
  ipUrls: ""
  # Comma-separated URLs to POST JSON when the public IP changes (previous_ip, current_ip, updated_at)
  webhookUrls: ""

persistence:
  enabled: true
  mountPath: /var/lib/watcher
  size: 10Mi
  storageClassName: longhorn

# Extra env vars: plain values, or from ConfigMap/Secret via valueFrom
# extraEnv:
#   - name: LOG_LEVEL
#     value: "debug"
#   - name: API_KEY
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: SECRET_NAME_HERE
#   - name: EXTERNAL_URL
#     valueFrom:
#       configMapKeyRef:
#         name: my-config
#         key: url
extraEnv: []

# Load all keys from ConfigMap or Secret
# extraEnvFrom:
#   - secretRef:
#       name: my-app-secrets
#   - configMapRef:
#       name: my-app-config
extraEnvFrom: []

# Set true only if you add data to templates/secret.yaml (or use external secret tooling)
secret:
  create: false
