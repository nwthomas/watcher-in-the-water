# Default values for watcher-in-the-water

replicaCount: 1

image:
  # Matches CI: docker.io/$DOCKER_USERNAME/watcher-in-the-water
  repository: docker.io/nwthomas/watcher-in-the-water
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: golang-server.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Do not raise maxReplicas above 1 while persistence is enabled: the chart uses a
# single ReadWriteOnce PVC, so extra replicas cannot share the state volume.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

healthCheck:
  enabled: true
  livenessPath: /health/live
  readinessPath: /health/ready
  # Allow time for the first outbound public-IP poll before readiness must succeed.
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 3

app:
  port: 8080
  logFormat: json
  logLevel: info
  checkInterval: 5m
  statePath: /var/lib/watcher/state.json
  ipUrls: ""

persistence:
  enabled: true
  mountPath: /var/lib/watcher
  size: 1Gi
  storageClassName: ""

# Extra env vars: plain values, or from ConfigMap/Secret via valueFrom
# extraEnv:
#   - name: LOG_LEVEL
#     value: "debug"
#   - name: API_KEY
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: SECRET_NAME_HERE
#   - name: EXTERNAL_URL
#     valueFrom:
#       configMapKeyRef:
#         name: my-config
#         key: url
extraEnv: []

# Load all keys from ConfigMap or Secret
# extraEnvFrom:
#   - secretRef:
#       name: my-app-secrets
#   - configMapRef:
#       name: my-app-config
extraEnvFrom: []

# Set true only if you add data to templates/secret.yaml (or use external secret tooling)
secret:
  create: false
